# ============================================================
#  CONFIGURACAO DO PIPELINE QUIMIOMETRICO
#  Edite os valores abaixo. Cada campo tem uma explicacao no
#  comentario logo acima. Voce NAO precisa abrir o codigo.
#  Para rodar:   python pipeline.py --rodar
#  Assistente:   python guaraci.py
# ============================================================

# Origem dos dados: dx (JCAMP-DX, FT-NIR) | csv (tabela generica) |
# imagem (colorimetria digital, prototipo) | sintetico (teste)
#   opcoes: dx | csv | imagem | sintetico
#   Use "sintetico" para testar sem dados reais (dados gerados em memoria)
modo_entrada: sintetico

# Modo imagem: incluir features de textura (GLCM) alem de cor (media/desvio
# RGB+HSV+Lab) -- requer 'pip install scikit-image'. So' importa se
# modo_entrada: imagem.
imagem_incluir_textura: false

# Pasta com os arquivos .dx (modo dx; uma subpasta por classe)
#   Necessario apenas quando modo_entrada: dx
pasta_dados: dados

# Caminho do CSV (modo csv): colunas espectrais/variaveis + 1 coluna de classe
arquivo_csv: seus_espectros.csv

# Nome da coluna de classe/rotulo no CSV (modo csv)
coluna_classe: classe

# Nome da coluna de concentracao no CSV (vazio se nao houver; modo csv)
coluna_concentracao: ''

# Pasta onde os resultados serao gravados
pasta_saida: resultados_tcc

# Nivel: N1=especie | N2=puro/adulterado | N3=teor
#   opcoes: N1 | N2 | N3
nivel: N1

# Objetivo cientifico: filtra QUAIS figuras/relatorios sao gerados.
# 'auto' deriva do nivel acima (N1/N2=Classificacao, N3=Quantificacao) e
# preserva o comportamento historico. Defina explicitamente para o Modo
# Exploratorio (so PCA/HCA/loadings/pre-proc, sem PLS-DA/regressao).
#   opcoes: auto | exploratorio | classificacao | quantificacao
objetivo: auto

# Pre-processamento espectral
#   opcoes: MSC+SG+MC | SNV+SG+MC | Autoscaling | Mean-centering
pre_processamento: MSC+SG+MC

# Inicio da faixa espectral util (cm-1)
faixa_min_cm: 4000.0

# Fim da faixa espectral util (cm-1)
faixa_max_cm: 10000.0

# Especies a remover da analise (ex: [Copaiba])
excluir_classes: []

# Numero maximo de variaveis latentes (LVs) testadas
max_lvs: 40

# Fracao reservada para teste externo (0 a 0.5)
holdout_fracao: 0.2

# Manter replicas (T1/T2/T3) juntas na validacao (evita vazamento)
validacao_group_aware: true

# Iteracoes do teste de permutacao
n_permutacoes: 200

# Processos paralelos para os testes de permutacao/Wold.
#   1 (padrao) = sequencial, resultado identico. Medido: 4 processos = ~2x
#   mais rapido no pipeline completo; acima disso o ganho cai (overhead de
#   criar processos). Deixe em 1 em ambientes com pouca RAM/CPU (ex.:
#   Streamlit Cloud gratuito).
n_jobs_permutacao: 1

# Modulos "extra" (fora do conjunto padrao de ~7-9 figuras "core") -- ligue
# na mao so o que quiser ver a mais. DD-SIMCA e' o unico que o proprio
# pipeline liga sozinho quando nivel=N2 (autenticacao de pureza); em nivel=N1
# ele e' ignorado com aviso mesmo que voce ponha true aqui (nao agrega a um
# estudo de identificacao de especie).

# Rodar teste de Wold (intercepts R2Y/Q2Y)
teste_wold: false

# Rodar CV-ANOVA (Eriksson)
teste_cv_anova: false

# Teste de incerteza de Martens (jackknifing dos coeficientes PLS) -- teste
# de hipotese formal (p-valor) de significancia por variavel, mais rigoroso
# que VIP/Selectivity Ratio (medidas de magnitude, sem p-valor)
teste_martens: false

# Rodar Etapa 4 (iPLS / VIP / SR / sPLS-DA)
selecao_variaveis_etapa4: false

# Etapa 4: rodar tambem SPA/APS (Algoritmo das Projecoes Sucessivas,
# Araujo et al. 2001) -- mais lento que iPLS/VIP/SR
selecao_spa: false

# Etapa 4: rodar tambem AG (Algoritmo Genetico, GA-PLS) -- o mais lento dos
# metodos de selecao de variaveis
selecao_ag: false

# Rodar DD-SIMCA (classificacao one-class) -- automatico em nivel=N2,
# ignorado com aviso em nivel=N1 (nao agrega a identificacao de especie)
ddsimca: false

# DD-SIMCA: modo de treino -- 'puros' treina SO com amostras de referencia
# pura (o resto da classe conta como contaminante/adulterado -- autenticacao
# de verdade, requer >=15 puras/classe); 'todos' treina com a classe inteira
# (exploratorio, mais robusto com poucas puras, porem menos rigoroso)
#   opcoes: puros | todos
modo_ddsimca: puros

# Rodar OPLS-DA
opls_da: false

# Comparar varios pre-processamentos
comparar_pre_processamentos: false

# Auto-Benchmark: SVM RBF / RF / XGBoost vs PLS-DA (mesma CV group-aware)
benchmark: false

# Auto-Benchmark de regressao: Ridge/Lasso/Elastic Net/SVR/RF vs PLS-R
# (so' roda com regressao multi-especie ja calculada, N2/N3)
benchmark_regressao: false

# Monte Carlo CV: IC95% por percentil (N repeticoes estratificadas por grupo)
monte_carlo: false

# Numero de repeticoes do Monte Carlo CV
n_monte_carlo: 60

# MC CV: incluir SVM RBF / RF / XGBoost alem do PLS-DA (mais lento)
monte_carlo_incluir_todos: false

# SHAP values (TreeExplainer) para RF/XGBoost/GBM -- interpretabilidade
# espectral (requer 'pip install shap')
shap_benchmark: false

# Limite de amostras para calculo de SHAP (controle de memoria)
shap_max_amostras: 500

# Gerar tambem as figuras exploratorias/detalhadas (HCA, loadings PCA,
# pre-processamento, contribuicao de score, DD-SIMCA por classe, Cooman).
#   false (padrao) = so o conjunto essencial (mais rapido, menos arquivos)
figuras_detalhadas: false

# Usar formas diferentes por classe nos graficos de score
figuras_mostrar_marcadores: false

# Desenhar elipses de confianca por grupo
figuras_mostrar_elipses: false

# Formato das figuras
#   opcoes: png | pdf | svg
formato_figura: png

# Resolucao das figuras (DPI)
dpi: 600

# Abrir cada figura na tela ao gerar (alem de salvar)
abrir_figuras_na_tela: false
