name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ── Lint estático (rápido, falha cedo antes de rodar a suíte pesada) ───────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff (lint)
        run: ruff check --output-format=github .

  # ── Testes + cobertura ────────────────────────────────────────────────────
  # Matriz cruzada: o produto é Windows-first (código de encoding/console
  # específico de win32 em guaraci.py/cli_assistente.py), então validamos em
  # windows-latest além de ubuntu e macos, nas pontas da faixa suportada
  # (3.10–3.13, requires-python em pyproject.toml). macOS só entra nas
  # pontas (3.10/3.13) para não triplicar o tempo total de CI à toa — Windows
  # e Linux já cobrem toda a faixa de versão.
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        include:
          - os: macos-latest
            python-version: "3.10"
          - os: macos-latest
            python-version: "3.13"

    defaults:
      run:
        shell: bash   # Git Bash no Windows: mesma sintaxe de comando nos 2 SOs

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # xgboost (extra [benchmark]) linka contra libomp em runtime no macOS;
      # macos-latest nao vem com o Homebrew OpenMP pre-instalado (ao contrario
      # de ubuntu/windows, onde o wheel do xgboost ja embute o equivalente).
      # Sem isso, todo teste que importa xgboost falha com dlopen "Library
      # not loaded: @rpath/libomp.dylib" -- nao e' um bug do guaraci.
      - name: Install libomp (macOS only, required by xgboost)
        if: runner.os == 'macOS'
        run: brew install libomp

      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
          pip install -e .   # valida o empacotamento (src/guaraci, entry point `guaraci`)

      - name: Run tests with coverage
        # Suíte completa (inclui o end-to-end 'slow'): valida a integração dos
        # módulos extraídos e dá cobertura real do caminho de execução, não só
        # das funções puras.
        # --cov-fail-under=60 é um PISO-CATRACA anti-regressão. O total local
        # (--cov=.) está em ~68% após a extração de lógica pura das UIs e do
        # núcleo (app_logic, cli_logic, resumo_parse, config_io, resultados_io);
        # 60 deixa ~8 pts de margem p/ diferenças de plataforma/versão. Suba o
        # número conforme cobrir mais UI/orquestrador.
        run: pytest tests/ --cov=. --cov-report=term-missing --cov-report=xml --cov-fail-under=60

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage.xml
