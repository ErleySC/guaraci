name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ── Lint estático (rápido, falha cedo antes de rodar a suíte pesada) ───────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff (lint)
        run: ruff check --output-format=github .

  # ── Testes + cobertura ────────────────────────────────────────────────────
  # Matriz cruzada: o produto é Windows-first (código de encoding/console
  # específico de win32 em guaraci.py/cli_assistente.py), então validamos em
  # windows-latest além de ubuntu, nas pontas da faixa suportada (3.10–3.12).
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    defaults:
      run:
        shell: bash   # Git Bash no Windows: mesma sintaxe de comando nos 2 SOs

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
          pip install -e .   # valida o empacotamento (src/guaraci, entry point `guaraci`)

      - name: Run tests with coverage
        # Suíte completa (inclui o end-to-end 'slow'): valida a integração dos
        # 10 módulos extraídos na Fase H e dá cobertura real do caminho de
        # execução, não só das funções puras.
        # --cov-fail-under=30 é um PISO-CATRACA: hoje o total (~32%) é puxado
        # para baixo pelos arquivos de UI ainda sem teste. O gate impede
        # REGRESSÃO; suba o número conforme extrair lógica das UIs.
        run: pytest tests/ --cov=. --cov-report=term-missing --cov-report=xml --cov-fail-under=30

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage.xml
